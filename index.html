<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案件管理システム</title>
  <style>
    /* ニューモーフィズム & ブランドカラー設定 
      ベースの白黒（ライトグレー）空間に、指定色をアクセントとして配置
    */
    :root {
      /* 指定カラー */
      --color-base: #00385D;      /* 深いネイビー（テキスト・重要要素） */
      --color-sub: #39DAFF;       /* 水色（アクセント1） */
      --color-accent: #FFB900;    /* 黄色（アクセント2） */
      --color-black: #000000;
      --color-white: #ffffff;

      /* ニューモーフィズム用パレット（添付画像準拠） */
      --nm-bg: #EFF2F9;           /* 全体の背景色 */
      --nm-text-main: #6E7F8D;    /* 基本テキスト色（美しいグレー） */
      --nm-text-light: #B5BFC6;   /* 補助テキスト色 */
      
      /* シャドウ定義 */
      --shadow-outer: 8px 8px 16px rgba(110, 127, 141, 0.2), -8px -8px 16px rgba(255, 255, 255, 1);
      --shadow-outer-sm: 4px 4px 8px rgba(110, 127, 141, 0.15), -4px -4px 8px rgba(255, 255, 255, 1);
      --shadow-inner: inset 4px 4px 8px rgba(110, 127, 141, 0.15), inset -4px -4px 8px rgba(255, 255, 255, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      /* 添付画像のような繊細なフォント指定 */
      font-family: 'Avenir Next', 'Helvetica Neue', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background-color: var(--nm-bg);
      color: var(--nm-text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* サイドバー：境界線をなくし、背景と同化させる */
    .sidebar {
      width: 260px;
      padding: 56px 32px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .brand {
      font-size: 1.8rem;
      font-weight: 300; /* 細字で洗練された印象に */
      color: var(--color-base);
      margin-bottom: 64px;
      letter-spacing: 0.1em;
      line-height: 1.2;
    }
    .brand strong { font-weight: 800; display: block; }

    .nav-menu { list-style: none; flex-grow: 1; }
    .nav-item { margin-bottom: 24px; }

    .nav-link {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      color: var(--nm-text-main);
      text-decoration: none;
      border-radius: 16px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
    }

    /* アクティブなメニューは凹む（Inner Shadow） */
    .nav-link.active {
      box-shadow: var(--shadow-inner);
      color: var(--color-base);
    }

    .nav-link:hover:not(.active) {
      box-shadow: var(--shadow-outer-sm);
      color: var(--color-base);
    }

    /* メインコンテンツ */
    .main-content {
      flex-grow: 1;
      padding: 56px 56px 56px 24px;
      overflow-y: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 56px;
    }

    .page-title {
      font-size: 3.5rem; /* ジャンプ率最大化 */
      font-weight: 800;
      color: var(--color-black);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    /* ニューモーフィズム風ボタン */
    .btn-primary {
      background-color: var(--nm-bg);
      color: var(--color-base);
      border: none;
      padding: 16px 40px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      box-shadow: var(--shadow-outer);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-primary:hover {
      box-shadow: var(--shadow-inner);
      color: var(--color-sub);
    }

    /* カードデザイン（出っ張り） */
    .nm-card {
      background-color: var(--nm-bg);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow-outer);
      margin-bottom: 48px;
    }

    /* 稼働メーター */
    .status-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-info h3 {
      font-size: 1rem;
      font-weight: 500;
      color: var(--nm-text-main);
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--color-base);
      letter-spacing: -0.02em;
    }

    /* 光るようなステータスドット */
    .status-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      margin-right: 24px;
      background-color: var(--color-accent); /* 指定の黄色 */
      box-shadow: 0 0 12px var(--color-accent), inset 2px 2px 4px rgba(255,255,255,0.8);
    }

    /* ガントチャートエリア */
    .gantt-wrapper {
      padding: 0;
      overflow: hidden;
    }

    .gantt-header-title {
      padding: 32px 40px;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--color-base);
      letter-spacing: 0.05em;
    }

    .gantt-body {
      display: flex;
      min-width: 900px;
    }

    /* 左側：タスク情報 */
    .gantt-sidebar {
      width: 320px;
      flex-shrink: 0;
      padding-bottom: 24px;
    }

    .gantt-task-head, .gantt-date {
      height: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--nm-text-light);
      display: flex;
      align-items: center;
    }
    
    .gantt-task-head { padding: 0 40px; }

    .gantt-task {
      height: 72px;
      padding: 0 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .task-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-base);
      margin-top: 6px;
    }

    /* 右側：タイムライン */
    .gantt-timeline {
      flex-grow: 1;
      padding-bottom: 24px;
    }

    .gantt-dates {
      display: grid;
      grid-template-columns: repeat(14, 1fr);
      margin-bottom: 8px;
    }

    .gantt-date { justify-content: center; }

    .gantt-tracks { display: flex; flex-direction: column; }

    /* 罫線を消し、うっすらとした凹み（溝）で日付を表現 */
    .gantt-track {
      height: 72px;
      display: grid;
      grid-template-columns: repeat(14, 1fr);
      align-items: center;
      position: relative;
    }
    
    .gantt-track::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      right: 24px;
      height: 12px;
      transform: translateY(-50%);
      border-radius: 10px;
      box-shadow: var(--shadow-inner);
      z-index: 0;
    }

    /* ガントバー：指定色を美しく乗せる */
    .gantt-bar {
      height: 32px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 0.8rem;
      font-weight: 800;
      z-index: 1;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .gantt-bar:hover { transform: scale(1.02); }

    /* 指定カラーの適用 */
    .bg-sub { 
      background-color: var(--color-sub); 
      color: var(--color-base); 
      box-shadow: 0 4px 12px rgba(57, 218, 255, 0.4);
    }
    .bg-accent { 
      background-color: var(--color-accent); 
      color: var(--color-black);
      box-shadow: 0 4px 12px rgba(255, 185, 0, 0.4);
    }
    .bg-base { 
      background-color: var(--color-base); 
      color: var(--color-white);
      box-shadow: 0 4px 12px rgba(0, 56, 93, 0.3);
    }

    /* ステータスバッジ（極小の凸デザイン） */
    .badge {
      padding: 4px 12px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 800;
      display: inline-block;
      width: fit-content;
      box-shadow: var(--shadow-outer-sm);
    }
    .badge-ongoing { color: var(--color-sub); }
    .badge-review { color: var(--color-accent); }
    .badge-waiting { color: var(--nm-text-light); }

  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="brand">
      Marketing<br><strong>Portal.</strong>
    </div>
    <ul class="nav-menu">
      <li class="nav-item"><a href="#" class="nav-link active">Dashboard</a></li>
      <li class="nav-item"><a href="#" class="nav-link">Projects</a></li>
      <li class="nav-item"><a href="#" class="nav-link">Files</a></li>
      <li class="nav-item"><a href="#" class="nav-link">Settings</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <header class="header">
      <h1 class="page-title">Dashboard</h1>
      <button class="btn-primary" onclick="alert('依頼フォームを開きます')">
        <span style="font-size: 1.4rem; line-height: 1;">＋</span> New Request
      </button>
    </header>

    <section class="nm-card status-card">
      <div class="status-info">
        <h3>Marketing Dept. Capacity</h3>
        <div class="status-indicator">
          <span class="status-dot"></span>
          やや混雑（新規着手: 6/25以降）
        </div>
      </div>
    </section>

    <section class="nm-card gantt-wrapper">
      <div class="gantt-header-title">Active Projects</div>
      <div class="gantt-body">
        
        <div class="gantt-sidebar">
          <div class="gantt-task-head">Project & Status</div>
          <div class="gantt-task">
            <span class="badge badge-ongoing">In Progress</span>
            <div class="task-title">秋期キャンペーンLP制作</div>
          </div>
          <div class="gantt-task">
            <span class="badge badge-review">Review</span>
            <div class="task-title">展示会パンフレット改修</div>
          </div>
          <div class="gantt-task">
            <span class="badge badge-waiting">Waiting</span>
            <div class="task-title">新規事業ロゴデザイン</div>
          </div>
        </div>

        <div class="gantt-timeline">
          <div class="gantt-dates">
            <div class="gantt-date">17</div><div class="gantt-date">18</div><div class="gantt-date">19</div><div class="gantt-date">20</div><div class="gantt-date">21</div><div class="gantt-date">22</div><div class="gantt-date">23</div><div class="gantt-date">24</div><div class="gantt-date">25</div><div class="gantt-date">26</div><div class="gantt-date">27</div><div class="gantt-date">28</div><div class="gantt-date">29</div><div class="gantt-date">30</div>
          </div>

          <div class="gantt-tracks">
            <div class="gantt-track">
              <div class="gantt-bar bg-sub" style="grid-column: 1 / 9; margin-left: 12px;">デザイン進行</div>
            </div>
            <div class="gantt-track">
              <div class="gantt-bar bg-accent" style="grid-column: 4 / 12; margin-left: 12px;">先方確認中</div>
            </div>
            <div class="gantt-track">
              <div class="gantt-bar bg-base" style="grid-column: 9 / 15; margin-left: 12px;">着手予定</div>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

</body>
</html>
