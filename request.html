<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規案件依頼 - Marketing Portal</title>
  <style>
    /* ニューモーフィズム & ブランドカラー設定 */
    :root {
      --color-base: #00385D;   /* 決定・主要ボタン */
      --color-sub: #39DAFF;    /* アクティブ色 */
      --color-accent: #FFB900; /* 注意・強調 */
      --color-black: #000000;
      --color-white: #ffffff;

      --nm-bg: #EFF2F9;
      --nm-text-main: #6E7F8D;
      --nm-text-light: #B5BFC6;
      --wireframe-line: rgba(110, 127, 141, 0.25);
      
      --shadow-outer: 8px 8px 16px rgba(110, 127, 141, 0.2), -8px -8px 16px rgba(255, 255, 255, 1);
      --shadow-outer-sm: 4px 4px 8px rgba(110, 127, 141, 0.15), -4px -4px 8px rgba(255, 255, 255, 1);
      --shadow-inner: inset 4px 4px 8px rgba(110, 127, 141, 0.15), inset -4px -4px 8px rgba(255, 255, 255, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Avenir Next', 'Helvetica Neue', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background-color: var(--nm-bg);
      color: var(--nm-text-main);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      padding: 40px 24px;
      display: flex;
      justify-content: center;
    }

    /* フォーム全体のコンテナ */
    .form-container {
      width: 100%;
      max-width: 700px;
      background-color: var(--nm-bg);
      border-radius: 24px;
      padding: 56px 48px;
      box-shadow: var(--shadow-outer);
    }

    .form-header {
      margin-bottom: 48px;
      text-align: center;
    }

    .form-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--color-base);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .form-subtitle {
      font-size: 0.9rem;
      color: var(--nm-text-light);
      letter-spacing: 0.05em;
    }

    /* 各入力グループ */
    .form-group {
      margin-bottom: 32px;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-base);
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .required-mark {
      color: var(--color-accent);
      margin-left: 4px;
      font-weight: bold;
    }

    /* 共通の入力フィールド（凹みデザイン） */
    .form-control {
      width: 100%;
      background-color: var(--nm-bg);
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 1rem;
      color: var(--color-base);
      font-family: inherit;
      box-shadow: var(--shadow-inner);
      transition: all 0.3s ease;
      outline: none;
    }

    .form-control:focus {
      border-color: rgba(57, 218, 255, 0.5); /* フォーカス時に水色に光る */
      box-shadow: var(--shadow-inner), 0 0 8px rgba(57, 218, 255, 0.2);
    }

    .form-control::placeholder {
      color: var(--nm-text-light);
    }

    textarea.form-control {
      min-height: 160px;
      resize: vertical;
    }

    /* ラジオボタン・チェックボックス（ボタン風デザイン） */
    .radio-group {
      display: flex;
      gap: 16px;
    }

    .radio-label {
      flex: 1;
      position: relative;
      cursor: pointer;
    }

    .radio-label input {
      position: absolute;
      opacity: 0;
      cursor: pointer;
    }

    .radio-btn {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      background-color: var(--nm-bg);
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--nm-text-main);
      box-shadow: var(--shadow-outer-sm);
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    /* 選択時の状態（凹んで色が変わる） */
    .radio-label input:checked ~ .radio-btn {
      box-shadow: var(--shadow-inner);
      color: var(--color-base);
      border-color: var(--color-sub);
    }

    /* ファイルアップロードエリア（点線と凸デザイン） */
    .file-upload-wrapper {
      position: relative;
      width: 100%;
      padding: 40px 20px;
      background-color: var(--nm-bg);
      border: 2px dashed var(--nm-text-light);
      border-radius: 16px;
      text-align: center;
      box-shadow: var(--shadow-outer-sm);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .file-upload-wrapper:hover {
      border-color: var(--color-sub);
      background-color: rgba(57, 218, 255, 0.05);
    }

    .file-upload-wrapper input[type="file"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .file-upload-text {
      font-weight: 600;
      color: var(--color-base);
      margin-bottom: 8px;
    }

    .file-upload-subtext {
      font-size: 0.8rem;
      color: var(--nm-text-light);
    }

    /* 送信ボタン */
    .form-actions {
      margin-top: 56px;
      display: flex;
      gap: 24px;
    }

    .btn {
      flex: 1;
      padding: 18px 0;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-submit {
      background-color: var(--nm-bg);
      color: var(--color-base);
      box-shadow: var(--shadow-outer);
    }

    .btn-submit:hover {
      box-shadow: var(--shadow-inner);
      color: var(--color-sub);
    }

    .btn-cancel {
      background-color: transparent;
      color: var(--nm-text-light);
      box-shadow: none;
      border: 1px solid var(--wireframe-line);
    }

    .btn-cancel:hover {
      background-color: var(--nm-text-light);
      color: var(--color-white);
    }

    /* SP対応 */
    @media screen and (max-width: 768px) {
      body { padding: 16px; }
      .form-container { padding: 40px 24px; border-radius: 16px; }
      .form-title { font-size: 1.8rem; }
      .radio-group { flex-direction: column; gap: 12px; }
      .form-actions { flex-direction: column-reverse; gap: 16px; margin-top: 40px; }
      .btn { padding: 16px 0; }
    }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="form-header">
      <h1 class="form-title">New Request</h1>
      <p class="form-subtitle">新規案件の依頼フォーム</p>
    </div>

    <form onsubmit="event.preventDefault(); alert('システム実装後、データが送信されます。');">
      
      <div class="form-group">
        <label class="form-label">依頼者名（担当者）<span class="required-mark">*</span></label>
        <input type="text" class="form-control" placeholder="例：株式会社〇〇 山田太郎" required>
      </div>

      <div class="form-group">
        <label class="form-label">作成依頼物（案件名）<span class="required-mark">*</span></label>
        <input type="text" class="form-control" placeholder="例：秋期キャンペーン用ランディングページ" required>
      </div>

      <div class="form-group">
        <label class="form-label">希望納品日<span class="required-mark">*</span></label>
        <input type="date" class="form-control" required>
      </div>

      <div class="form-group">
        <label class="form-label">この案件で優先する項目<span class="required-mark">*</span></label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="priority" value="speed" checked>
            <span class="radio-btn">納期優先（スピード重視）</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="priority" value="quality">
            <span class="radio-btn">品質優先（クオリティ重視）</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">依頼内容・目的<span class="required-mark">*</span></label>
        <textarea class="form-control" placeholder="ターゲット層、目的、参考URLなど、詳細を記述してください。" required></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">添付ファイル（ロゴ・素材・指示書など）</label>
        <div class="file-upload-wrapper">
          <input type="file" multiple id="fileInput" onchange="updateFileName()">
          <div class="file-upload-text">クリック、またはファイルをドロップしてアップロード</div>
          <div class="file-upload-subtext" id="fileNameDisplay">最大ファイルサイズ: 50MBまで</div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-cancel" onclick="history.back()">キャンセル</button>
        <button type="submit" class="btn btn-submit">依頼を送信する</button>
      </div>

    </form>
  </div>

  <script>
    // ファイル選択時にファイル名を表示する簡易スクリプト
    function updateFileName() {
      const input = document.getElementById('fileInput');
      const display = document.getElementById('fileNameDisplay');
      if (input.files && input.files.length > 0) {
        if (input.files.length === 1) {
          display.textContent = '選択中: ' + input.files[0].name;
        } else {
          display.textContent = input.files.length + ' 個のファイルを選択中';
        }
        display.style.color = 'var(--color-base)';
        display.style.fontWeight = 'bold';
      } else {
        display.textContent = '最大ファイルサイズ: 50MBまで';
        display.style.color = 'var(--nm-text-light)';
        display.style.fontWeight = 'normal';
      }
    }
  </script>

</body>
</html>
