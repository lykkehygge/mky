<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規案件依頼 - Marketing Portal</title>
  <style>
    /* ニューモーフィズム & ブランドカラー設定 */
    :root {
      --color-base: #00385D;
      --color-sub: #39DAFF;
      --color-accent: #FFB900;
      --color-black: #000000;
      --color-white: #ffffff;

      --nm-bg: #EFF2F9;
      --nm-text-main: #6E7F8D;
      --nm-text-light: #B5BFC6;
      --wireframe-line: rgba(110, 127, 141, 0.25);
      
      --shadow-outer: 8px 8px 16px rgba(110, 127, 141, 0.2), -8px -8px 16px rgba(255, 255, 255, 1);
      --shadow-outer-sm: 4px 4px 8px rgba(110, 127, 141, 0.15), -4px -4px 8px rgba(255, 255, 255, 1);
      --shadow-inner: inset 4px 4px 8px rgba(110, 127, 141, 0.15), inset -4px -4px 8px rgba(255, 255, 255, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Avenir Next', 'Helvetica Neue', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background-color: var(--nm-bg);
      color: var(--nm-text-main);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      padding: 40px 24px;
      display: flex;
      justify-content: center;
    }

    .form-container {
      width: 100%;
      max-width: 700px;
      background-color: var(--nm-bg);
      border-radius: 24px;
      padding: 56px 48px;
      box-shadow: var(--shadow-outer);
    }

    .form-header { margin-bottom: 48px; text-align: center; }
    .form-title { font-size: 2.2rem; font-weight: 800; color: var(--color-base); letter-spacing: -0.02em; margin-bottom: 8px; }
    .form-subtitle { font-size: 0.9rem; color: var(--nm-text-light); letter-spacing: 0.05em; }

    .form-group { margin-bottom: 32px; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--color-base); margin-bottom: 12px; letter-spacing: 0.05em; }
    .required-mark { color: var(--color-accent); margin-left: 4px; font-weight: bold; }

    .form-control {
      width: 100%; background-color: var(--nm-bg); border: 1px solid transparent; border-radius: 12px;
      padding: 16px 20px; font-size: 1rem; color: var(--color-base); font-family: inherit;
      box-shadow: var(--shadow-inner); transition: all 0.3s ease; outline: none;
    }
    .form-control:focus { border-color: rgba(57, 218, 255, 0.5); box-shadow: var(--shadow-inner), 0 0 8px rgba(57, 218, 255, 0.2); }
    .form-control::placeholder { color: var(--nm-text-light); }
    textarea.form-control { min-height: 160px; resize: vertical; }

    .radio-group { display: flex; gap: 16px; }
    .radio-label { flex: 1; position: relative; cursor: pointer; }
    .radio-label input { position: absolute; opacity: 0; cursor: pointer; }
    .radio-btn {
      display: flex; justify-content: center; align-items: center; padding: 16px; background-color: var(--nm-bg);
      border-radius: 12px; font-weight: 600; font-size: 0.95rem; color: var(--nm-text-main);
      box-shadow: var(--shadow-outer-sm); transition: all 0.2s ease; border: 1px solid transparent;
    }
    .radio-label input:checked ~ .radio-btn { box-shadow: var(--shadow-inner); color: var(--color-base); border-color: var(--color-sub); }

    /* --- ファイルアップロード エリア --- */
    .file-upload-wrapper {
      position: relative; width: 100%; padding: 40px 20px; background-color: var(--nm-bg);
      border: 2px dashed var(--nm-text-light); border-radius: 16px; text-align: center;
      box-shadow: var(--shadow-outer-sm); transition: all 0.3s ease; cursor: pointer;
    }
    .file-upload-wrapper:hover { border-color: var(--color-sub); background-color: rgba(57, 218, 255, 0.05); }
    
    /* input自体は透明にして全体を覆う */
    .file-upload-wrapper input[type="file"] {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
    }
    
    .file-upload-text { font-weight: 600; color: var(--color-base); margin-bottom: 8px; }
    .file-upload-subtext { font-size: 0.8rem; color: var(--nm-text-light); }

    /* --- 選択されたファイルのリスト表示 --- */
    .file-list {
      list-style: none;
      margin-top: 16px;
      padding: 0;
    }
    
    .file-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--nm-bg);
      padding: 12px 20px;
      border-radius: 12px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--color-base);
      font-weight: 500;
      /* 凹んだトレイの中にファイルが置かれているような表現 */
      box-shadow: var(--shadow-inner); 
    }

    .file-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 85%;
    }

    .file-remove-btn {
      color: var(--nm-text-light);
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s;
    }
    .file-remove-btn:hover { color: var(--color-accent); }

    /* 送信ボタン */
    .form-actions { margin-top: 56px; display: flex; gap: 24px; }
    .btn { flex: 1; padding: 18px 0; border: none; border-radius: 30px; font-size: 1.1rem; font-weight: 800; letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s ease; }
    .btn-submit { background-color: var(--nm-bg); color: var(--color-base); box-shadow: var(--shadow-outer); }
    .btn-submit:hover { box-shadow: var(--shadow-inner); color: var(--color-sub); }
    .btn-cancel { background-color: transparent; color: var(--nm-text-light); box-shadow: none; border: 1px solid var(--wireframe-line); }
    .btn-cancel:hover { background-color: var(--nm-text-light); color: var(--color-white); }

    @media screen and (max-width: 768px) {
      body { padding: 16px; }
      .form-container { padding: 40px 24px; border-radius: 16px; }
      .form-title { font-size: 1.8rem; }
      .radio-group { flex-direction: column; gap: 12px; }
      .form-actions { flex-direction: column-reverse; gap: 16px; margin-top: 40px; }
      .btn { padding: 16px 0; }
    }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="form-header">
      <h1 class="form-title">New Request</h1>
      <p class="form-subtitle">新規案件の依頼フォーム</p>
    </div>

    <form id="requestForm" onsubmit="event.preventDefault(); alert('現在 ' + dataTransfer.files.length + ' 個のファイルが添付されています。システム実装後、データが送信されます。');">
      
      <div class="form-group">
        <label class="form-label">依頼者名（担当者）<span class="required-mark">*</span></label>
        <input type="text" class="form-control" placeholder="例：株式会社〇〇 山田太郎" required>
      </div>

      <div class="form-group">
        <label class="form-label">作成依頼物（案件名）<span class="required-mark">*</span></label>
        <input type="text" class="form-control" placeholder="例：秋期キャンペーン用ランディングページ" required>
      </div>

      <div class="form-group">
        <label class="form-label">希望納品日<span class="required-mark">*</span></label>
        <input type="date" class="form-control" required>
      </div>

      <div class="form-group">
        <label class="form-label">この案件で優先する項目<span class="required-mark">*</span></label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="priority" value="speed" checked>
            <span class="radio-btn">納期優先（スピード重視）</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="priority" value="quality">
            <span class="radio-btn">品質優先（クオリティ重視）</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">依頼内容・目的<span class="required-mark">*</span></label>
        <textarea class="form-control" placeholder="ターゲット層、目的、参考URLなど、詳細を記述してください。" required></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">添付ファイル（複数選択・追加可能）</label>
        
        <div class="file-upload-wrapper">
          <input type="file" multiple id="fileInput">
          <div class="file-upload-text">クリックしてファイルを追加</div>
          <div class="file-upload-subtext">複数回に分けて追加できます（1ファイル最大50MB）</div>
        </div>

        <ul id="fileList" class="file-list"></ul>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-cancel" onclick="history.back()">キャンセル</button>
        <button type="submit" class="btn btn-submit">依頼を送信する</button>
      </div>

    </form>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileListContainer = document.getElementById('fileList');
    
    // 複数回に分けて選択されたファイルを保持するためのオブジェクト
    let dataTransfer = new DataTransfer();

    // ファイルが選択（追加）された時の処理
    fileInput.addEventListener('change', function() {
      // 新しく選択されたファイルを DataTransfer に追加していく
      for (let i = 0; i < fileInput.files.length; i++) {
        dataTransfer.items.add(fileInput.files[i]);
      }
      
      // input要素が持っているファイル情報を、追加済みの全ファイル情報で上書きする
      fileInput.files = dataTransfer.files;
      
      // リストを画面に描画
      renderFileList();
    });

    // ファイルリストを画面に表示する関数
    function renderFileList() {
      // 一度リストを空にする
      fileListContainer.innerHTML = '';
      
      // 保持しているファイル群をループしてリストアイテム（li）を作成
      for (let i = 0; i < fileInput.files.length; i++) {
        const file = fileInput.files[i];
        
        const li = document.createElement('li');
        li.className = 'file-list-item';
        
        const nameSpan = document.createElement('span');
        nameSpan.className = 'file-name';
        nameSpan.textContent = file.name;
        
        const removeBtn = document.createElement('span');
        removeBtn.className = 'file-remove-btn';
        removeBtn.innerHTML = '×';
        // 削除ボタンが押されたら、そのインデックスのファイルを消す
        removeBtn.onclick = function() { removeFile(i); };

        li.appendChild(nameSpan);
        li.appendChild(removeBtn);
        fileListContainer.appendChild(li);
      }
    }

    // 特定のファイルをリストから削除する関数
    function removeFile(indexToRemove) {
      // 新しい DataTransfer オブジェクトを作成
      const newDataTransfer = new DataTransfer();
      
      // 削除対象以外のファイルを新しい DataTransfer に詰め直す
      for (let i = 0; i < fileInput.files.length; i++) {
        if (i !== indexToRemove) {
          newDataTransfer.items.add(fileInput.files[i]);
        }
      }
      
      // 変数と input要素のファイル情報を新しいものに更新
      dataTransfer = newDataTransfer;
      fileInput.files = dataTransfer.files;
      
      // リストを再描画
      renderFileList();
    }
  </script>

</body>
</html>
